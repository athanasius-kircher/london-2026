<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#ece1c4"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="none" stroke="#a9812f" stroke-width="3" opacity="0.6"/>
  <rect x="18" y="18" width="364" height="364" rx="8" fill="none" stroke="#a9812f" stroke-width="1.5" opacity="0.4"/>

  <!-- ground -->
  <line x1="60" y1="340" x2="340" y2="340" stroke="#2b241c" stroke-width="3"/>

  <!-- boots -->
  <rect x="170" y="320" width="24" height="20" fill="#2b241c"/>
  <rect x="206" y="320" width="24" height="20" fill="#2b241c"/>

  <!-- legs -->
  <rect x="175" y="260" width="18" height="65" fill="#2b241c"/>
  <rect x="207" y="260" width="18" height="65" fill="#2b241c"/>

  <!-- tunic -->
  <rect x="150" y="170" width="100" height="95" rx="6" fill="#7a2426" stroke="#2b241c" stroke-width="3"/>
  <line x1="200" y1="170" x2="200" y2="265" stroke="#a9812f" stroke-width="3"/>
  <circle cx="200" cy="190" r="4" fill="#a9812f"/>
  <circle cx="200" cy="210" r="4" fill="#a9812f"/>
  <circle cx="200" cy="230" r="4" fill="#a9812f"/>

  <!-- arms -->
  <rect x="130" y="180" width="20" height="75" rx="8" fill="#7a2426" stroke="#2b241c" stroke-width="2.5"/>
  <rect x="250" y="180" width="20" height="75" rx="8" fill="#7a2426" stroke="#2b241c" stroke-width="2.5"/>

  <!-- rifle -->
  <line x1="260" y1="150" x2="260" y2="290" stroke="#2b241c" stroke-width="5"/>

  <!-- face -->
  <circle cx="200" cy="150" r="20" fill="#ece1c4" stroke="#2b241c" stroke-width="2.5"/>

  <!-- bearskin hat -->
  <path d="M172 145 Q170 90 200 85 Q230 90 228 145 Z" fill="#2b241c"/>
  <rect x="178" y="130" width="44" height="14" fill="#a9812f"/>
