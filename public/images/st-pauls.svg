<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#ece1c4"/>
  <rect x="10" y="10" width="380" height="380" rx="12" fill="none" stroke="#a9812f" stroke-width="3" opacity="0.6"/>
  <rect x="18" y="18" width="364" height="364" rx="8" fill="none" stroke="#a9812f" stroke-width="1.5" opacity="0.4"/>

  <!-- base -->
  <rect x="90" y="260" width="220" height="80" fill="#ece1c4" stroke="#2b241c" stroke-width="3"/>
  <line x1="90" y1="340" x2="310" y2="340" stroke="#2b241c" stroke-width="3"/>

  <!-- columns -->
  <line x1="115" y1="260" x2="115" y2="330" stroke="#2b241c" stroke-width="3"/>
  <line x1="145" y1="260" x2="145" y2="330" stroke="#2b241c" stroke-width="3"/>
  <line x1="175" y1="260" x2="175" y2="330" stroke="#2b241c" stroke-width="3"/>
  <line x1="225" y1="260" x2="225" y2="330" stroke="#2b241c" stroke-width="3"/>
  <line x1="255" y1="260" x2="255" y2="330" stroke="#2b241c" stroke-width="3"/>
  <line x1="285" y1="260" x2="285" y2="330" stroke="#2b241c" stroke-width="3"/>

  <!-- drum -->
  <rect x="120" y="180" width="160" height="80" fill="#ddd0ab" stroke="#2b241c" stroke-width="3"/>
  <line x1="140" y1="180" x2="140" y2="260" stroke="#2b241c" stroke-width="1.5" opacity="0.6"/>
  <line x1="170" y1="180" x2="170" y2="260" stroke="#2b241c" stroke-width="1.5" opacity="0.6"/>
  <line x1="200" y1="180" x2="200" y2="260" stroke="#2b241c" stroke-width="1.5" opacity="0.6"/>
  <line x1="230" y1="180" x2="230" y2="260" stroke="#2b241c" stroke-width="1.5" opacity="0.6"/>
  <line x1="260" y1="180" x2="260" y2="260" stroke="#2b241c" stroke-width="1.5" opacity="0.6"/>

  <!-- dome -->
  <path d="M110 180 A90 90 0 0 1 290 180 Z" fill="#ddd0ab" stroke="#2b241c" stroke-width="3"/>
  <path d="M140 180 A60 90 0 0 1 260 180" fill="none" stroke="#a9812f" stroke-width="2" opacity="0.6"/>

  <!-- lantern + cross -->
  <rect x="188" y="100" width="24" height="30" fill="#ddd0ab" stroke="#2b241c" stroke-width="2.5"/>
  <line x1="200" y1="100" x2="200" y2="70" stroke="#2b241c" stroke-width="3"/>
  <line x1="190" y1="80" x2="210" y2="80" stroke="#2b241c" stroke-width="3"/>
